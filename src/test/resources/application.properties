# 테스트 전용 기본값. .env나 CI 환경변수 없이도(압축 해제 직후에도) mvn test가 돌도록
# application.yml의 필수 환경변수 자리에 안전한 값을 채운다. 운영 클래스패스에는 포함되지 않는다.
spring.datasource.url=jdbc:h2:mem:hopes-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test
spring.mail.password=test-mail-password
server.port=0
hopes.auth.token-secret=test-secret-key-for-hopes-integration-tests
hopes.auth.token-validity-hours=24
hopes.verification.ttl-minutes=5
hopes.mail.enabled=false
hopes.mail.from=hopes-test@gsm.hs.kr
hopes.cors.allowed-origins=http://localhost:3000
hopes.ai.enabled=false
hopes.rate-limit.messages-per-minute=0
hopes.rate-limit.login-attempts-per-minute=0
hopes.rate-limit.verification-requests-per-minute=0
hopes.rate-limit.verification-attempts-per-minute=0
hopes.rate-limit.auth-requests-per-ip-per-minute=0
