spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: hopes-server
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      "[mail.smtp.auth]": true
      "[mail.smtp.starttls.enable]": true
      "[mail.smtp.starttls.required]": true
      "[mail.smtp.connectiontimeout]": 5000
      "[mail.smtp.timeout]": 5000
      "[mail.smtp.writetimeout]": 5000

server:
  port: ${PORT}

hopes:
  ai:
    enabled: ${AI_ENABLED:true}
    gemini-api-key: ${GEMINI_API_KEY:}
    chat-model: ${AI_CHAT_MODEL:gemini-3.1-flash-lite}
    embedding-model: ${AI_EMBEDDING_MODEL:gemini-embedding-001}
    chunks-path: ${AI_CHUNKS_PATH:classpath:data/gsm_guide_rag_chunks.jsonl}
    cache-path: ${AI_CACHE_PATH:./data/embeddings_cache.json}
    top-k: ${AI_TOP_K:3}
    min-similarity: ${AI_MIN_SIMILARITY:0.55}
    history-max-turns: ${AI_HISTORY_MAX_TURNS:20}
    index-retry-seconds: ${AI_INDEX_RETRY_SECONDS:30}
  rate-limit:
    messages-per-minute: ${RATE_LIMIT_MESSAGES_PER_MINUTE:10}
  auth:
    token-secret: ${TOKEN_SECRET}
    token-validity-hours: ${TOKEN_VALIDITY_HOURS}
  verification:
    ttl-minutes: ${VERIFICATION_TTL_MINUTES}
  mail:
    enabled: ${MAIL_ENABLED}
    from: ${MAIL_FROM}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
