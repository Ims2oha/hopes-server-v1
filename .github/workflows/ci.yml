name: 서버 지속적 통합

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: 서버-지속적-통합-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: 빌드 및 테스트
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      PORT: 8080
      TOKEN_SECRET: ci-test-token-secret-with-at-least-64-characters-1234567890
      TOKEN_VALIDITY_HOURS: 168
      VERIFICATION_TTL_MINUTES: 10
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      MAIL_ENABLED: false
      MAIL_HOST: localhost
      MAIL_PORT: 2525
      MAIL_USERNAME: test
      MAIL_PASSWORD: test
      MAIL_FROM: test@example.com
      DATABASE_URL: jdbc:h2:mem:hopes-ci;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
      DATABASE_USERNAME: sa
      DATABASE_PASSWORD: ""

    steps:
      - name: 소스 코드 받기
        uses: actions/checkout@v6

      - name: 자바 21 준비
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: 전체 빌드 및 테스트
        run: mvn --batch-mode --no-transfer-progress clean verify
